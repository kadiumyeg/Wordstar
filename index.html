<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Star — 300 High-Frequency Words</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --sun:#FFD600;--green:#2E7D32;--coral:#D32F2F;--blue:#1565C0;
  --sky:#42A5F5;--purple:#6A1B9A;--bg:#EEF4FB;--card:#fff;
  --radius:16px;--shadow:0 4px 16px rgba(0,0,0,.09);
  --display:'Baloo 2',sans-serif;--body:'Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--body);background:var(--bg);min-height:100vh;overflow-x:hidden;}
.stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.sdot{position:absolute;border-radius:50%;background:var(--sun);opacity:.14;animation:twinkle 3s infinite alternate;}
@keyframes twinkle{to{opacity:.30;transform:scale(1.4);}}
header{position:relative;z-index:10;background:linear-gradient(120deg,#0D47A1,#1976D2,#42A5F5);
  color:#fff;padding:13px 18px;display:flex;align-items:center;gap:12px;
  box-shadow:0 3px 14px rgba(0,0,0,.22);flex-wrap:wrap;}
.logo{font-family:var(--display);font-size:1.75rem;font-weight:800;}
.logo span{color:var(--sun);}
.hdr-right{margin-left:auto;display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
.stars-pill{background:var(--sun);color:#333;border-radius:20px;padding:5px 13px;font-weight:800;font-size:.88rem;}
.btn-nav{background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.35);color:#fff;
  border-radius:9px;padding:6px 13px;font-family:var(--body);font-weight:700;font-size:.8rem;cursor:pointer;}
.btn-nav:hover{background:rgba(255,255,255,.28);}
main{position:relative;z-index:5;max-width:780px;margin:0 auto;padding:22px 15px 60px;}
.screen{display:none;}.screen.active{display:block;}
.sec-title{font-family:var(--display);font-size:1.5rem;font-weight:800;color:var(--blue);margin-bottom:5px;}
.sec-sub{color:#666;font-size:.88rem;margin-bottom:18px;}

/* LEVEL GRID */
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.lcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:17px 15px;cursor:pointer;border:3px solid transparent;position:relative;
  transition:transform .15s,box-shadow .15s;}
.lcard:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.13);}
.lcard.alpha-card{border:3px solid #FFD600;background:linear-gradient(135deg,#FFFDE7,#FFF9C4);}
.licon{font-size:1.9rem;margin-bottom:5px;}
.lname{font-family:var(--display);font-size:1rem;font-weight:800;}
.lrange{font-size:.73rem;color:#aaa;margin-top:1px;}
.lexpect{font-size:.72rem;font-weight:700;margin-top:5px;padding:2px 7px;border-radius:6px;display:inline-block;}
.lprog{margin-top:9px;height:8px;background:#eee;border-radius:8px;overflow:hidden;}
.lbar{height:100%;border-radius:8px;transition:width .4s;}
.lpct{font-size:.7rem;color:#bbb;margin-top:3px;}
.exp-banner{position:absolute;top:8px;right:8px;font-size:.62rem;font-weight:800;
  background:var(--sun);color:#333;border-radius:6px;padding:2px 6px;}

/* MODE */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:16px;}
.mcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:20px 13px;cursor:pointer;text-align:center;border:3px solid transparent;transition:transform .15s,border-color .15s;}
.mcard:hover{transform:translateY(-3px);border-color:var(--sky);}
.mcard.alpha-mode{border-color:#FFB300;background:#FFFDE7;}
.mcard.alpha-mode:hover{border-color:#F9A825;}
.mode-section-label{font-family:var(--display);font-size:.85rem;font-weight:800;color:#888;
  text-transform:uppercase;letter-spacing:.5px;margin:16px 0 10px;padding-bottom:6px;
  border-bottom:2px solid #eee;}
.micon{font-size:2.1rem;margin-bottom:6px;}
.mname{font-family:var(--display);font-size:.98rem;font-weight:800;color:#222;}
.mdesc{font-size:.74rem;color:#888;margin-top:3px;}

/* BUTTONS */
.btn-back{background:#eee;border:none;border-radius:10px;padding:9px 19px;cursor:pointer;
  font-family:var(--body);font-weight:700;font-size:.88rem;color:#555;}
.btn-back:hover{background:#ddd;}
.btn-primary{background:linear-gradient(120deg,var(--blue),var(--sky));color:#fff;border:none;
  border-radius:12px;padding:11px 24px;font-family:var(--body);font-weight:800;font-size:.92rem;
  cursor:pointer;box-shadow:var(--shadow);transition:transform .15s;}
.btn-primary:hover{transform:translateY(-2px);}

/* AUDIO BUTTON */
.btn-audio{background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.5);color:#fff;
  border-radius:50%;width:38px;height:38px;font-size:1.1rem;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
.btn-audio:hover{background:rgba(255,255,255,.38);}
.btn-audio.dark{background:#E3F2FD;border-color:#90CAF9;color:var(--blue);}
.btn-audio.dark:hover{background:#BBDEFB;}
.btn-audio.speaking{animation:pulse-ring .6s infinite;}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(66,165,245,.5);}70%{box-shadow:0 0 0 8px rgba(66,165,245,0);}100%{box-shadow:0 0 0 0 rgba(66,165,245,0);}}

/* GAME TOP */
.game-top{display:flex;align-items:center;gap:9px;margin-bottom:15px;flex-wrap:wrap;}
.prog-wrap{flex:1;height:11px;background:#ddd;border-radius:10px;overflow:hidden;min-width:90px;}
.prog-bar{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--sky),var(--blue));transition:width .4s;}
.score-pill{background:var(--sun);color:#333;border-radius:18px;padding:4px 12px;font-weight:800;font-size:.86rem;}
.q-count{font-size:.8rem;color:#666;white-space:nowrap;}

/* FLASHCARD */
.fc-wrap{perspective:800px;margin:8px auto 18px;max-width:340px;height:185px;cursor:pointer;}
.fc{width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s;position:relative;}
.fc.flipped{transform:rotateY(180deg);}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);
  box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
.fc-front{background:linear-gradient(130deg,#0D47A1,#42A5F5);color:#fff;}
.fc-back{background:linear-gradient(130deg,#1B5E20,#66BB6A);color:#fff;transform:rotateY(180deg);}
.fc-word{font-family:var(--display);font-size:3rem;font-weight:800;letter-spacing:1px;}
.fc-hint{font-size:.8rem;opacity:.8;}
.fc-sentence{font-size:.98rem;text-align:center;padding:0 18px;line-height:1.55;}
.fc-btns{display:flex;gap:11px;justify-content:center;margin-top:6px;}
.btn-knew,.btn-practice{border:none;border-radius:12px;padding:10px 22px;font-family:var(--body);
  font-weight:800;font-size:.92rem;cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.12);transition:transform .1s;}
.btn-knew{background:#2E7D32;color:#fff;}
.btn-practice{background:#C62828;color:#fff;}
.btn-knew:hover,.btn-practice:hover{transform:translateY(-2px);}

/* MULTIPLE CHOICE */
.mc-box{background:linear-gradient(130deg,#0D47A1,#1976D2);color:#fff;border-radius:var(--radius);
  padding:26px 17px;text-align:center;margin-bottom:15px;box-shadow:var(--shadow);}
.mc-big{font-family:var(--display);font-size:3rem;font-weight:800;}
.mc-sent{font-size:.98rem;opacity:.88;margin-top:8px;line-height:1.6;}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mc-btn{background:var(--card);border:3px solid #e0e0e0;border-radius:13px;padding:14px 8px;
  font-family:var(--display);font-size:1.3rem;font-weight:800;cursor:pointer;
  transition:border-color .15s,background .15s,transform .1s;box-shadow:var(--shadow);}
.mc-btn:hover{border-color:var(--sky);transform:translateY(-2px);}
.mc-btn.correct{background:#E8F5E9;border-color:#2E7D32;animation:pop .3s;}
.mc-btn.wrong{background:#FFEBEE;border-color:#C62828;}
@keyframes pop{50%{transform:scale(1.07);}}

/* SPELL IT */
.spell-box{background:linear-gradient(130deg,#4A148C,#7B1FA2);color:#fff;border-radius:var(--radius);
  padding:22px 17px;text-align:center;margin-bottom:15px;box-shadow:var(--shadow);}
.spell-sent{font-size:1.02rem;line-height:1.6;}
.spell-blank{display:inline-block;border-bottom:3px solid rgba(255,255,255,.8);min-width:65px;}
.ltiles{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:11px;}
.ltile{width:36px;height:42px;background:var(--card);border:2px solid #ddd;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-family:var(--display);
  font-size:1.18rem;font-weight:800;cursor:pointer;transition:background .15s,border-color .15s;}
.ltile:hover{background:#E3F2FD;border-color:var(--sky);}
.ltile.used{opacity:.28;pointer-events:none;}
.spell-row{display:flex;gap:9px;margin-bottom:11px;}
.spell-inp{flex:1;border:3px solid #ddd;border-radius:13px;padding:12px 13px;font-family:var(--display);
  font-size:1.45rem;font-weight:800;text-align:center;outline:none;transition:border-color .15s;}
.spell-inp:focus{border-color:var(--purple);}
.spell-inp.correct{border-color:#2E7D32;background:#E8F5E9;}
.spell-inp.wrong{border-color:#C62828;background:#FFEBEE;}
.btn-check{background:var(--purple);color:#fff;border:none;border-radius:13px;
  padding:12px 19px;font-family:var(--body);font-weight:800;font-size:.92rem;cursor:pointer;}

/* SORT */
.sort-instr{text-align:center;color:#555;font-size:.88rem;margin-bottom:11px;}
.sort-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:50px;margin-bottom:16px;}
.sort-chip{background:linear-gradient(120deg,var(--blue),var(--sky));color:#fff;border-radius:26px;
  padding:7px 16px;font-family:var(--display);font-size:1.02rem;font-weight:800;
  cursor:pointer;box-shadow:var(--shadow);transition:transform .15s;}
.sort-chip:hover{transform:scale(1.07);}
.sort-chip.selected{outline:3px solid var(--sun);}
.sort-bins{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sort-bin{background:var(--card);border-radius:var(--radius);border:3px dashed #ccc;
  padding:12px;min-height:88px;cursor:pointer;transition:border-color .2s,background .2s;}
.sort-bin:hover{border-color:var(--sky);background:#F0F8FF;}
.sort-bin h4{font-family:var(--display);font-size:.92rem;font-weight:800;margin-bottom:8px;}
.placed-area{display:flex;flex-wrap:wrap;gap:5px;}
.placed-chip{border-radius:16px;padding:3px 10px;font-family:var(--display);font-size:.85rem;font-weight:800;color:#fff;}
.placed-chip.pending{background:#90CAF9;}
.placed-chip.ok{background:#2E7D32;}
.placed-chip.bad{background:#C62828;}
.btn-check-sort{display:block;margin:13px auto 0;background:var(--blue);color:#fff;
  border:none;border-radius:12px;padding:11px 28px;font-family:var(--body);font-weight:800;font-size:.92rem;cursor:pointer;}

/* ═══ ALPHABET GAMES ═══ */
/* Letter Recognition */
.alpha-box{background:linear-gradient(130deg,#E65100,#FF8F00);color:#fff;border-radius:var(--radius);
  padding:28px 17px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow);}
.alpha-letter-display{font-family:var(--display);font-size:5rem;font-weight:800;line-height:1;
  display:flex;align-items:center;justify-content:center;gap:20px;}
.alpha-case-label{font-size:.8rem;opacity:.8;margin-top:6px;}
.alpha-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
.alpha-btn{background:var(--card);border:3px solid #e0e0e0;border-radius:13px;padding:14px 6px;
  font-family:var(--display);font-size:1.6rem;font-weight:800;cursor:pointer;
  transition:border-color .15s,background .15s,transform .1s;box-shadow:var(--shadow);text-align:center;}
.alpha-btn:hover{border-color:#FF8F00;transform:translateY(-2px);}
.alpha-btn.correct{background:#E8F5E9;border-color:#2E7D32;animation:pop .3s;}
.alpha-btn.wrong{background:#FFEBEE;border-color:#C62828;}

/* Letter Sound (Phonics) */
.phonics-box{background:linear-gradient(130deg,#1A237E,#283593);color:#fff;border-radius:var(--radius);
  padding:24px 17px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow);}
.phonics-picture{font-size:5rem;margin-bottom:8px;display:block;}
.phonics-word{font-family:var(--display);font-size:1.4rem;font-weight:800;margin-bottom:4px;}
.phonics-instr{font-size:.82rem;opacity:.8;}
.phonics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.phonics-btn{background:var(--card);border:3px solid #e0e0e0;border-radius:13px;padding:14px 6px;
  font-family:var(--display);font-size:1.8rem;font-weight:800;cursor:pointer;
  transition:border-color .15s,background .15s,transform .1s;box-shadow:var(--shadow);}
.phonics-btn:hover{border-color:#3949AB;transform:translateY(-2px);}
.phonics-btn.correct{background:#E8F5E9;border-color:#2E7D32;animation:pop .3s;}
.phonics-btn.wrong{background:#FFEBEE;border-color:#C62828;}

/* Alphabet Order */
.order-instr{text-align:center;color:#555;font-size:.88rem;margin-bottom:12px;}
.order-target{background:linear-gradient(130deg,#4A148C,#7B1FA2);color:#fff;border-radius:var(--radius);
  padding:18px;text-align:center;margin-bottom:14px;box-shadow:var(--shadow);}
.order-target-label{font-size:.8rem;opacity:.8;margin-bottom:6px;}
.order-slots{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.order-slot{width:44px;height:52px;border:3px dashed rgba(255,255,255,.5);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-family:var(--display);
  font-size:1.5rem;font-weight:800;}
.order-slot.filled{border-style:solid;border-color:rgba(255,255,255,.8);background:rgba(255,255,255,.15);}
.order-slot.correct{border-color:#A5D6A7;background:rgba(165,214,167,.2);}
.order-slot.wrong{border-color:#EF9A9A;background:rgba(239,154,154,.2);}
.order-pool{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.order-chip{background:linear-gradient(120deg,#4A148C,#7B1FA2);color:#fff;border-radius:12px;
  width:46px;height:52px;display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:1.5rem;font-weight:800;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .15s;}
.order-chip:hover{transform:scale(1.1);}
.order-chip.selected{outline:3px solid var(--sun);}
.order-chip.used{opacity:.25;pointer-events:none;}

/* Uppercase Lowercase Match */
.match-instr{text-align:center;color:#555;font-size:.88rem;margin-bottom:14px;}
.match-show{background:linear-gradient(130deg,#00695C,#00897B);color:#fff;border-radius:var(--radius);
  padding:22px 17px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow);}
.match-big{font-family:var(--display);font-size:4.5rem;font-weight:800;line-height:1;}
.match-label{font-size:.8rem;opacity:.8;margin-top:6px;}
.match-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.match-btn{background:var(--card);border:3px solid #e0e0e0;border-radius:13px;padding:14px 6px;
  font-family:var(--display);font-size:1.7rem;font-weight:800;cursor:pointer;
  transition:border-color .15s,background .15s,transform .1s;box-shadow:var(--shadow);}
.match-btn:hover{border-color:#00897B;transform:translateY(-2px);}
.match-btn.correct{background:#E8F5E9;border-color:#2E7D32;animation:pop .3s;}
.match-btn.wrong{background:#FFEBEE;border-color:#C62828;}


/* LETTER HUNT */
.hunt-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px;}
.hunt-btn{background:var(--card);border:3px solid #e0e0e0;border-radius:11px;padding:12px 4px;
  font-family:var(--display);font-size:1.5rem;font-weight:800;cursor:pointer;
  transition:border-color .15s,background .15s,transform .1s;box-shadow:var(--shadow);}
.hunt-btn:hover{border-color:var(--sky);transform:scale(1.08);}
.hunt-btn.found{background:#E8F5E9;border-color:#2E7D32;color:#2E7D32;animation:pop .3s;}
.hunt-btn.wrong-tap{background:#FFEBEE;border-color:#C62828;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}

/* RESULTS */
#result-screen{text-align:center;padding:26px 10px;}
.res-trophy{font-size:5rem;margin-bottom:8px;animation:bounce 1s infinite alternate;}
@keyframes bounce{to{transform:translateY(-12px);}}
.res-title{font-family:var(--display);font-size:1.9rem;font-weight:800;color:var(--blue);margin-bottom:5px;}
.res-score{font-size:1.05rem;color:#444;margin-bottom:16px;}
.res-stars{font-size:1.8rem;margin-bottom:20px;}
.res-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* REPORT */
.rpt-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.rpt-top h2{font-family:var(--display);font-size:1.4rem;font-weight:800;color:var(--blue);}
.rpt-date{font-size:.76rem;color:#aaa;margin-top:3px;}
.rpt-name-row{display:flex;gap:9px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.rpt-name-inp{border:2px solid #ddd;border-radius:10px;padding:9px 13px;font-family:var(--body);
  font-size:.92rem;flex:1;min-width:150px;outline:none;}
.rpt-name-inp:focus{border-color:var(--sky);}
.rpt-summary{background:linear-gradient(120deg,#E3F2FD,#E8F5E9);border-radius:var(--radius);
  padding:15px 17px;margin-bottom:14px;border:2px solid #BBDEFB;}
.rpt-summary h3{font-family:var(--display);font-size:1.05rem;font-weight:800;color:var(--blue);margin-bottom:10px;}
.srow{display:flex;justify-content:space-between;font-size:.85rem;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.srow:last-child{border-bottom:none;}
.srow strong{color:#333;}
.rpt-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 17px;margin-bottom:12px;}
.rpt-card-hdr{display:flex;align-items:center;gap:9px;margin-bottom:10px;flex-wrap:wrap;}
.rpt-card-hdr h3{font-family:var(--display);font-size:1rem;font-weight:800;}
.ebadge{font-size:.69rem;font-weight:800;border-radius:7px;padding:2px 8px;}
.ebadge.met{background:#E8F5E9;color:#1B5E20;}
.ebadge.partial{background:#FFF8E1;color:#E65100;}
.ebadge.notmet{background:#FFEBEE;color:#B71C1C;}
.rbar-row{display:flex;gap:9px;align-items:center;margin-bottom:7px;}
.rbar-label{font-size:.78rem;color:#666;min-width:90px;}
.rbar-wrap{flex:1;height:9px;background:#eee;border-radius:8px;overflow:hidden;min-width:70px;}
.rbar{height:100%;border-radius:8px;}
.rbar.good{background:#2E7D32;}
.rbar.mid{background:#F57F17;}
.rbar.low{background:#C62828;}
.rbar-pct{font-size:.77rem;font-weight:700;min-width:34px;text-align:right;}
.expect-note{font-size:.77rem;color:#666;margin-top:7px;padding-top:7px;border-top:1px solid #f0f0f0;line-height:1.55;}
.expect-note strong{color:#333;}
.word-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.wchip{font-size:.72rem;border-radius:6px;padding:2px 8px;font-weight:700;}
.wchip.mastered{background:#E8F5E9;color:#1B5E20;}
.wchip.unseen{background:#F5F5F5;color:#9E9E9E;}
.rpt-btns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.btn-print{background:#455A64;color:#fff;border:none;border-radius:10px;
  padding:10px 20px;font-family:var(--body);font-weight:700;font-size:.85rem;cursor:pointer;}
.btn-danger-sm{background:#FFEBEE;color:#C62828;border:2px solid #FFCDD2;border-radius:10px;
  padding:10px 18px;font-family:var(--body);font-weight:700;font-size:.85rem;cursor:pointer;}
.lcard.locked-card{opacity:.55;cursor:default;}
.lcard.locked-card:hover{transform:none;box-shadow:var(--shadow);}
.lock-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:2rem;background:rgba(255,255,255,.45);border-radius:var(--radius);z-index:2;pointer-events:none;}
.btn-email{background:#1565C0;color:#fff;border:none;border-radius:10px;
  padding:10px 20px;font-family:var(--body);font-weight:700;font-size:.85rem;cursor:pointer;}
.btn-email:hover{background:#0D47A1;}
@media print{
  header,.btn-back,.btn-print,.btn-danger-sm,.btn-nav,.stars-bg,
  #level-screen,#mode-screen,#game-screen,#result-screen,
  .rpt-btns,.rpt-name-row{display:none!important;}
  body{background:#fff;}main{padding:0;}
  #report-screen{display:block!important;}
}
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(68px);

const UNLOCK_THRESHOLD=0.6;

function isUnlocked(id){
  if(id==='alpha'||id==='k') return true;
  if(unlockedLevels.has(id)) return true;
  const rules={
    'g1a':()=>pctRange(0,50)>=UNLOCK_THRESHOLD*100,
    'g1b':()=>pctRange(50,100)>=UNLOCK_THRESHOLD*100,
    'g2a':()=>pctRange(100,150)>=UNLOCK_THRESHOLD*100&&pctRange(0,125)>=50,
    'g2b':()=>pctRange(150,200)>=UNLOCK_THRESHOLD*100,
    'g3': ()=>pctRange(200,250)>=UNLOCK_THRESHOLD*100,
  };
  return rules[id]?rules[id]():true;
}

function tryUnlockWithPin(id){
  const pin=prompt('Enter parent/teacher PIN to unlock this level (default: 1234):');
  if(pin==='1234'||pin===localStorage.getItem('ws_pin')){
    unlockedLevels.add(id);saveState();renderLevelGrid();
    toast('Level unlocked! Keep practising to stay there.','good');
  } else if(pin!==null){
    toast('Incorrect PIN','bad');
  }
}

function changePIN(){
  const current=localStorage.getItem('ws_pin')||'1234';
  const entered=prompt('Enter current PIN to continue:');
  if(entered!==current){if(entered!==null)toast('Incorrect PIN','bad');return;}
  const newPin=prompt('Enter new PIN (numbers only, 4+ digits):');
  if(!newPin||!/^\d{4,}$/.test(newPin)){if(newPin!==null)toast('PIN must be 4+ digits','bad');return;}
  const confirm2=prompt('Confirm new PIN:');
  if(confirm2!==newPin){toast('PINs did not match','bad');return;}
  localStorage.setItem('ws_pin',newPin);
  toast('PIN updated successfully! 🔑','good');
}

// ═══ AUDIO ═══
function speak(text,rate=0.85){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=rate;u.pitch=1.1;u.lang='en-CA';
  // Wire speaking animation to all matching audio buttons
  const safe=text.replace(/"/g,'&quot;');
  u.onstart=()=>document.querySelectorAll(`[data-speak="${safe}"]`).forEach(b=>b.classList.add('speaking'));
  u.onend=u.onerror=()=>document.querySelectorAll('.btn-audio.speaking').forEach(b=>b.classList.remove('speaking'));
  window.speechSynthesis.speak(u);
}
function audioBtn(text,label='🔊',cls=''){
  const safe=text.replace(/"/g,'&quot;');
  return `<button class="btn-audio ${cls}" data-speak="${safe}" title="Listen">${label}<\/button>`;
}

// ═══ LEVEL GRID ═══
function renderLevelGrid(){
  const g=document.getElementById('level-grid');g.innerHTML='';
  LEVELS.forEach(lv=>{
    let pct=0,mCount=0,total=1;
    if(lv.isAlpha){
      mCount=alphaMastered.size;total=26;pct=Math.round(mCount/total*100);
    } else {
      const words=W.slice(lv.s,lv.e+1);
      mCount=words.filter((_,i)=>masteredSet.has(lv.s+i)).length;
      total=words.length;pct=Math.round(mCount/total*100);
    }
    const hasTarget=!lv.isAlpha&&lv.expectEnd&&lv.expectEnd>lv.s&&lv.expectEnd<=lv.e+1;
    const locked=!isUnlocked(lv.id);
    const c=document.createElement('div');
    c.className='lcard'+(lv.isAlpha?' alpha-card':'')+(locked?' locked-card':'');
    c.innerHTML=`
      ${locked?'<div class="lock-overlay">🔒<\/div>':''}
      ${hasTarget?`<div class="exp-banner">📌 Grade target here<\/div>`:''}
      <div class="licon">${lv.icon}<\/div>
      <div class="lname" style="color:${locked?'#bbb':lv.color}">${lv.name}<\/div>
      <div class="lrange">${lv.isAlpha?'A–Z, uppercase & lowercase':('Words '+(lv.s+1)+'–'+(lv.e+1))}<\/div>
      <div class="lexpect" style="background:${lv.color}20;color:${locked?'#bbb':lv.color}">${locked?'Keep practising to unlock! ⭐':lv.expectNote}<\/div>
      <div class="lprog"><div class="lbar" style="width:${pct}%;background:${locked?'#ddd':lv.color}"><\/div><\/div>
      <div class="lpct">${pct}% mastered (${mCount}/${total})<\/div>
    `;
    if(locked){
      c.onclick=()=>{
        toast('Keep practising the previous level to unlock this one! ⭐','bad');
        // Long-press handled via pointerdown timer
      };
      // Long-press (600ms) to unlock with PIN
      let pressTimer=null;
      c.addEventListener('pointerdown',()=>{pressTimer=setTimeout(()=>tryUnlockWithPin(lv.id),600);});

// ═══ WEIGHTED SHUFFLE (spaced repetition) ═══
// Words with higher wrongCount appear more often; practice pile words are always included first
function weightedSample(words, levelStart, n){
  // Always include practice pile words from this level first (up to half the session)
  const pileWords=words.filter(w=>{const i=W.indexOf(w);return practicePile.has(i);});
  const pileSlice=pileWords.sort(()=>Math.random()-.5).slice(0,Math.floor(n/2));
  const remaining=words.filter(w=>!pileSlice.includes(w));
  // Build weighted pool from remaining
  const weighted=[];
  remaining.forEach(w=>{
    const idx=W.indexOf(w);
    const wc=wrongCounts[idx]||0;
    const copies=1+Math.min(wc,3); // 1–4 copies based on wrong count
    for(let i=0;i<copies;i++) weighted.push(w);
  });
  weighted.sort(()=>Math.random()-.5);
  // Deduplicate while preserving order
  const seen=new Set(pileSlice);
  const extra=[];
  for(const w of weighted){
    if(!seen.has(w)){seen.add(w);extra.push(w);}
    if(extra.length>=n-pileSlice.length) break;
  }
  return [...pileSlice,...extra].slice(0,n);
}
function startGame(mode){

    sessWords.forEach(w=>{const i=W.indexOf(w);if(i>=0)seenSet.add(i);});
    saveState();renderQ();
  }
}

// 3) ALPHABET ORDER — put 5 letters in ABC order
// Fix: event delegation on gc so re-renders don't kill listeners
function renderAlphaOrder(gc){
  const startIdx=Math.floor(Math.random()*22);
  const run=ALPHABET.slice(startIdx,startIdx+5);
  const shuffled=[...run].sort(()=>Math.random()-.5);
  let assign=new Array(5).fill(null);  // local, not global
  let pending=null;

  function repaint(){
    gc.innerHTML=`
      <div class="order-instr">Put the letters in ABC order 👇 Tap a letter, then tap a box<\/div>
      <div class="order-target">
        <div class="order-target-label">Tap a box to place your letter<\/div>
        <div class="order-slots">
          ${assign.map((v,i)=>`<div class="order-slot ${v?'filled':''}" data-slot="${i}">${v||'?'}<\/div>`).join('')}
        <\/div>
      <\/div>
      <div style="margin:12px 0 6px;text-align:center;font-size:.8rem;color:#777">
        ${pending?`<strong style="color:#1565C0">Selected: ${pending}<\/strong> — now tap a box above`:'Tap a letter below to select it'}
      <\/div>
      <div class="order-pool">
        ${shuffled.map(l=>`<div class="order-chip ${assign.includes(l)?'used':''}" data-chip="${l}">${l}<\/div>`).join('')}
      <\/div>
      <button class="btn-check-sort" id="order-check-btn">Check ✓<\/button>`;
  }

  // Single delegated listener on gc — survives all repaints
  gc.addEventListener('click',function handler(e){
    // Chip click — select it
    const chip=e.target.closest('.order-chip:not(.used)');
    if(chip){ pending=chip.dataset.chip; repaint(); return; }

    // Slot click — place pending letter
    const slot=e.target.closest('.order-slot');
    if(slot && pending){
      const idx=parseInt(slot.dataset.slot);
      // If slot occupied, free the old letter
      if(assign[idx]) assign[assign.indexOf(assign[idx])]=null;  // clear old
      assign[idx]=pending;
      pending=null;
      repaint();
      return;
    }

    // Check button
    if(e.target.id==='order-check-btn'){
      if(assign.includes(null)){toast('Fill all the boxes first!','bad');return;}
      let score=0;
      assign.forEach((v,i)=>{
        const el=gc.querySelectorAll('.order-slot')[i];
        if(v===run[i]){el.classList.add('correct');score++;}
        else el.classList.add('wrong');
      });
      if(score===5){
        alphaMastered.add(run[0]);
        alphaScore+=5;document.getElementById('game-stars').textContent=alphaScore;
        toast('🎉 Perfect order!','good');saveState();
        gc.removeEventListener('click',handler);
        setTimeout(alphaNext,1400);
      } else {
        alphaScore+=score;document.getElementById('game-stars').textContent=alphaScore;
        toast(score+'/5 correct — the order was '+run.join(' '),'bad');saveState();
        gc.removeEventListener('click',handler);
        setTimeout(alphaNext,2500);
      }
    }
  });

  repaint();
}

// 4) LETTER HUNT — find ALL instances of a target letter in a jumbled grid
function renderLetterHunt(letter,gc){
  // Build a 4x5 grid (20 cells): ~4 targets, 16 distractors
  const targetCount=4;
  const distractors=ALPHABET.filter(l=>l!==letter);
  const cells=[];
  // Place targets (mix upper and lower)
  for(let i=0;i<targetCount;i++) cells.push(Math.random()>.5?letter:letter.toLowerCase());
  // Fill rest with random distractors (mix case)
  while(cells.length<20){
    const d=distractors[Math.floor(Math.random()*distractors.length)];
    cells.push(Math.random()>.5?d:d.toLowerCase());
  }
  cells.sort(()=>Math.random()-.5);
  let found=0;
  let wrongTaps=0;

  gc.innerHTML=`
    <div class="alpha-box" style="padding:16px 14px">
      <div style="font-size:.82rem;opacity:.82;margin-bottom:6px">Find ALL the letter ${letter} — upper AND lower case!<\/div>
      <div style="display:flex;align-items:center;justify-content:center;gap:14px">
        <div style="font-family:var(--display);font-size:3rem;font-weight:800">${letter} &amp; ${letter.toLowerCase()}<\/div>
        ${audioBtn('The letter '+letter,'🔊')}
      <\/div>
      <div id="hunt-status" style="font-size:.85rem;margin-top:6px">Found <strong>0<\/strong> of ${targetCount}<\/div>
    <\/div>
    <div class="hunt-grid" id="hunt-grid">
      ${cells.map((ch,i)=>`<button class="hunt-btn" data-idx="${i}" data-letter="${ch}" data-isletter="${ch.toLowerCase()===letter.toLowerCase()}">${ch}<\/button>`).join('')}
    <\/div>`;

  gc.querySelectorAll('.hunt-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      if(this.classList.contains('found')||this.classList.contains('wrong-tap')) return;
      if(this.dataset.isletter==='true'){
        this.classList.add('found');
        found++;
        document.getElementById('hunt-status').innerHTML=`Found <strong>${found}<\/strong> of ${targetCount}`;
        speak(letter);
        if(found===targetCount){
          alphaMastered.add(letter);
          alphaScore+=targetCount;document.getElementById('game-stars').textContent=alphaScore;
          toast('🎉 Found them all!','good');saveState();setTimeout(alphaNext,1200);
        }
      } else {
        this.classList.add('wrong-tap');
        wrongTaps++;
        setTimeout(()=>this.classList.remove('wrong-tap'),600);
      }
    });
  });
}

function rebuildPool(){
  const pool=document.getElementById('sort-pool');if(!pool)return;pool.innerHTML='';
  sortWords.forEach(w=>{
    if(sortAssign[w]!==undefined)return;
    const chip=document.createElement('div');chip.className='sort-chip';chip.textContent=w;
    chip.addEventListener('click',()=>{document.querySelectorAll('.sort-chip').forEach(c=>c.classList.remove('selected'));
      chip.classList.add('selected');pendingWord=w;speak(w);});
    pool.appendChild(chip);
  });
}
function binClick(key){
  if(!pendingWord)return;
  sortAssign[pendingWord]=key;
  const placed=document.getElementById('placed-'+key);
  const chip=document.createElement('div');chip.className='placed-chip pending';chip.textContent=pendingWord;
  placed.appendChild(chip);
  document.querySelectorAll('.sort-chip').forEach(c=>{if(c.textContent===pendingWord)c.remove();});
  pendingWord=null;
}
function chkSort(){
  if(Object.keys(sortAssign).length<sortWords.length){toast('Sort all the words first!','bad');return;}
  let correct=0;
  sortWords.forEach(w=>{
    const exp=w.length<=3?'short':'long',got=sortAssign[w];
    document.getElementById('placed-'+got).querySelectorAll('.placed-chip').forEach(c=>{
      if(c.textContent===w)c.classList.replace('pending',exp===got?'ok':'bad');
    });
    if(exp===got){correct++;masteredSet.add(W.indexOf(w));}
  });
  sessScore+=correct;document.getElementById('game-stars').textContent=sessScore;
  toast(`${correct}/${sortWords.length} correct!`,correct>=sortWords.length*.7?'good':'bad');
  saveState();setTimeout(showResults,1900);
}

function nextQ(){sessIdx++;if(sessIdx>=sessTotal||curMode==='sort')showResults();else renderQ();}

function showResults(){
  const pct=sessScore/sessTotal;
  const [trophy,title]=pct>=.9?['🏆','Superstar!']:pct>=.7?['🌟','Great Job!']:pct>=.5?['⭐','Good Try!']:['💪','Keep Going!'];
  const earned=Math.round(sessScore*2);addStars(earned);
  if(!levelProg[curLevel.id])levelProg[curLevel.id]=0;
  levelProg[curLevel.id]=Math.min(curLevel.e-curLevel.s+1,(levelProg[curLevel.id]||0)+sessScore);
  saveState();renderLevelGrid();
  document.getElementById('res-trophy').textContent=trophy;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-score').textContent=`${sessScore} out of ${sessTotal} right! +${earned} stars ⭐`;
  document.getElementById('res-stars').textContent='⭐'.repeat(Math.max(1,Math.round(pct*5)));
  show('result-screen');if(pct>=.7)confetti();
}

// ═══ REPORT ═══
function showReport(){
  const now=new Date();
  document.getElementById('rpt-date').textContent=
    `Generated: ${now.toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'})}`;
  document.getElementById('rpt-name').value=studentName;
  document.getElementById('rpt-teacher-email').value=teacherEmail;
  const kPct=pctRange(0,10),g1Pct=pctRange(0,45),g2Pct=pctRange(0,125);
  const alphaPct=Math.round(alphaMastered.size/26*100);

  let html=`
    <div class="rpt-summary">
      <h3>Overall Summary<\/h3>
      <div class="srow"><span>Student<\/span><strong>${studentName||'(not set)'}<\/strong><\/div>
      <div class="srow"><span>Alphabet mastered<\/span><strong>${alphaMastered.size} / 26 letters (${alphaPct}%)<\/strong><\/div>
      <div class="srow"><span>Words mastered<\/span><strong>${masteredSet.size} / 300<\/strong><\/div>
      <div class="srow"><span>Words practiced<\/span><strong>${seenSet.size} / 300<\/strong><\/div>
      <div class="srow"><span>Total stars earned<\/span><strong>⭐ ${totalStars}<\/strong><\/div>
      <div class="srow"><span>Kindergarten target (words 1–10)<\/span><strong>${badge(kPct)}<\/strong><\/div>
      <div class="srow"><span>Grade 1 target (words 1–45)<\/span><strong>${badge(g1Pct)}<\/strong><\/div>
      <div class="srow"><span>Grade 2 target (words 1–125)<\/span><strong>${badge(g2Pct)}<\/strong><\/div>
    <\/div>
    <div class="rpt-card">
      <div class="rpt-card-hdr">
        <h3>🔤 Alphabet Progress<\/h3>
        ${alphaPct>=80?'<span class="ebadge met">✅ Strong<\/span>':alphaPct>=50?'<span class="ebadge partial">🔄 In Progress<\/span>':'<span class="ebadge notmet">📌 Getting Started<\/span>'}
      <\/div>
      <div class="rbar-row"><div class="rbar-label">Mastered<\/div>
        <div class="rbar-wrap"><div class="rbar ${alphaPct>=80?'good':alphaPct>=50?'mid':'low'}" style="width:${alphaPct}%"><\/div><\/div>
        <div class="rbar-pct">${alphaPct}%<\/div><\/div>
      <div class="expect-note">Solid alphabet knowledge — both uppercase and lowercase — is the foundation for all reading and phonics work. Letters mastered: <strong>${[...alphaMastered].sort().join(', ')||'none yet'}<\/strong><\/div>
    <\/div>`;

  LEVELS.filter(l=>!l.isAlpha).forEach(lv=>{
    const words=W.slice(lv.s,lv.e+1);
    const mastered=words.filter((_,i)=>masteredSet.has(lv.s+i));
    const unseen=words.filter((_,i)=>!seenSet.has(lv.s+i));
    const mPct=Math.round(mastered.length/words.length*100);
    const sPct=Math.round((words.length-unseen.length)/words.length*100);
    const bc=mPct>=80?'good':mPct>=50?'mid':'low';
    let expNote='';
    if(lv.id==='k')expNote=`The teacher's expectation is that students know words 1–10 by end of Kindergarten. Word 10 is <strong>"it"<\/strong>. Current mastery of words 1–10: <strong>${kPct}%<\/strong>.`;
    else if(lv.id==='g1a')expNote=`The Grade 1 expectation boundary is word 45 (<strong>"which"<\/strong>). Current mastery of words 1–45: <strong>${g1Pct}%<\/strong>.`;
    else if(lv.id==='g1b')expNote=`The Grade 2 expectation boundary is word 125 (<strong>"think"<\/strong>). Current mastery of words 1–125: <strong>${g2Pct}%<\/strong>.`;
    else if(lv.id==='g2a')expNote=`These words are <strong>above the Grade 2 expectation<\/strong>. Excellent preparation for Grade 3.`;
    else expNote=`These words are <strong>well above Grade 2 expectations<\/strong>. Strong extension work.`;
    html+=`
      <div class="rpt-card">
        <div class="rpt-card-hdr">
          <h3>${lv.icon} ${lv.name} <span style="font-size:.78rem;font-weight:400;color:#aaa">words ${lv.s+1}–${lv.e+1}<\/span><\/h3>
          ${mPct>=80?'<span class="ebadge met">✅ Mastered<\/span>':mPct>=40?'<span class="ebadge partial">🔄 In Progress<\/span>':'<span class="ebadge notmet">📌 Not Started<\/span>'}
        <\/div>
        <div class="rbar-row"><div class="rbar-label">Mastered<\/div>
          <div class="rbar-wrap"><div class="rbar ${bc}" style="width:${mPct}%"><\/div><\/div>
          <div class="rbar-pct">${mPct}%<\/div><\/div>
        <div class="rbar-row"><div class="rbar-label">Practiced<\/div>
          <div class="rbar-wrap"><div class="rbar mid" style="width:${sPct}%"><\/div><\/div>
          <div class="rbar-pct">${sPct}%<\/div><\/div>
        <div class="expect-note">${expNote}<\/div>
        ${mastered.length?`<div style="font-size:.76rem;font-weight:700;color:#2E7D32;margin-top:10px;margin-bottom:5px">✅ Mastered (${mastered.length})<\/div>
          <div class="word-chips">${mastered.map(w=>`<span class="wchip mastered">${w}<\/span>`).join('')}<\/div>`:''}
        ${unseen.length?`<div style="font-size:.76rem;font-weight:700;color:#9E9E9E;margin-top:8px;margin-bottom:5px">⬜ Not yet practiced (${unseen.length})<\/div>
          <div class="word-chips">${unseen.map(w=>`<span class="wchip unseen">${w}<\/span>`).join('')}<\/div>`:''}
      <\/div>`;
  });
  document.getElementById('report-body').innerHTML=html;
  show('report-screen');
}

function pctRange(from,to){
  return Math.round([...Array(to-from).keys()].filter(i=>masteredSet.has(from+i)).length/(to-from)*100);
}
function badge(pct){
  if(pct>=80)return`<span class="ebadge met">✅ Met (${pct}%)<\/span>`;
  if(pct>=50)return`<span class="ebadge partial">🔄 Partial (${pct}%)<\/span>`;
  return`<span class="ebadge notmet">📌 Not Yet (${pct}%)<\/span>`;
}

// ═══ EMAIL REPORT ═══
function emailReport(){
  const name=studentName||'Student';
  const kPct=pctRange(0,10),g1Pct=pctRange(0,45),g2Pct=pctRange(0,125);
  const alphaPct=Math.round(alphaMastered.size/26*100);
  const struggling=W.filter((_,i)=>seenSet.has(i)&&!masteredSet.has(i)).slice(0,20);
  const subject='Word Star Progress Report — '+name;
  const lines=[
    'WORD STAR PROGRESS REPORT',
    'Student: '+name,
    'Date: '+new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'}),
    '',
    'GRADE TARGETS',
    'Kindergarten (words 1-10):  '+kPct+'%  '+(kPct>=80?'Met':'In progress'),
    'Grade 1 (words 1-45):       '+g1Pct+'%  '+(g1Pct>=80?'Met':'In progress'),
    'Grade 2 (words 1-125):      '+g2Pct+'%  '+(g2Pct>=80?'Met':'In progress'),
    '',
    'OVERALL PROGRESS',
    'Alphabet mastered: '+alphaMastered.size+'/26 letters ('+alphaPct+'%)',
    'Words mastered:    '+masteredSet.size+'/300',
    'Words practiced:   '+seenSet.size+'/300',
    'Stars earned:      '+totalStars,
    '',
    'WORDS NEEDING MORE PRACTICE',
    (struggling.length?struggling.join(', '):'None yet — keep playing!'),
    '',
    '---',
    'Sent from Word Star reading app',
  ];
  const body=lines.join('\n');
  const recipient=teacherEmail||'';
  window.location.href='mailto:'+recipient+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
}

// ═══ RESET ═══
function confirmReset(){
  if(confirm('Reset ALL progress? Stars, mastered words, alphabet progress, and level progress will be cleared. This cannot be undone.')){
    totalStars=0;levelProg={};masteredSet=new Set();seenSet=new Set();alphaMastered=new Set();unlockedLevels=new Set();
    wrongCounts={};practicePile=new Set();
    document.getElementById('total-stars').textContent='0';
    saveState();renderLevelGrid();toast('Progress reset!','bad');show('level-screen');
  }
}

// ═══ HELPERS ═══
function hi(s,w){return s.replace(new RegExp('\\b'+er(w)+'\\b'),'<strong>'+w+'<\/strong>');}
function er(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function eq(s){return s.replace(/'/g,"\\'");}
function toast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className=type;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1900);
}
function confetti(){
  const cols=['#FFD600','#42A5F5','#43A047','#F4511E','#C2185B','#6A1B9A'];
  for(let i=0;i<38;i++){
    const el=document.createElement('div');el.className='cpiec';
    el.style.cssText=`left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()*1.2}s;animation-duration:${1.5+Math.random()}s;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),3000);
  }
}
// Delegated audio button handler — handles all data-speak buttons anywhere in the DOM
document.addEventListener('click',function(e){
  const btn=e.target.closest('[data-speak]');
  if(btn){e.stopPropagation();speak(btn.getAttribute('data-speak'));}
});

init();
</script>
